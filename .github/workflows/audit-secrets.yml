name: Audit Secrets

on:
  schedule:
    - cron: "30 3 * * *"   # 03:30 daglig
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: PowerShell/PowerShell@v1
        with:
          pwsh-version: "7.4.x"

      - name: Azure CLI login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Collect Key Vault snapshot
        shell: pwsh
        run: |
          $kv = "${{ secrets.KEYVAULT_NAME }}"
          if (-not $kv) { throw "KEYVAULT_NAME secret mangler i repo/org." }
          $list = az keyvault secret list --vault-name $kv -o json | ConvertFrom-Json
          $out = [System.Collections.ArrayList]::new()
          foreach ($s in $list) {
            try {
              $name = $s.id.Split('/')[-1]
              $ver  = az keyvault secret show --vault-name $kv --name $name -o json | ConvertFrom-Json
              $exp  = $ver.attributes.expires
              $obj  = [pscustomobject]@{ name=$name; expires=$exp; enabled=$ver.attributes.enabled }
              [void]$out.Add($obj)
            } catch { }
          }
          $path = "audit_kv_secrets.json"
          $out | ConvertTo-Json -Depth 5 | Set-Content -Path $path -Encoding UTF8
          Write-Host "Skrev $path"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kv-secrets-audit
          path: audit_kv_secrets.json
