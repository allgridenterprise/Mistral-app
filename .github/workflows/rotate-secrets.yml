name: Rotate Secrets

on:
  schedule:
    - cron: "0 2 1 * *"   # 02:00 første dag i måneden
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      KEYVAULT_NAME: allgrid-bitwarden-kv
      APP_DISPLAY_NAME: Allgrid-AdminOrchestrator
      SECRET_YEARS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: PowerShell/PowerShell@v1
        with:
          pwsh-version: "7.4.x"

      - name: Azure CLI login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bitwarden Secrets Manager CLI
        run: |
          sudo npm install -g @bitwarden/cli-binaries@latest >/dev/null 2>&1 || true
          sudo npm install -g @bitwarden/cli@latest >/dev/null 2>&1 || true
          which bws || echo "bws not found in PATH; ensure it's available in runner image"

      - name: Rotate Graph client secret, save to BW and KV
        shell: pwsh
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          # Finn appId
          $app = az ad app list --display-name $env:APP_DISPLAY_NAME -o json | ConvertFrom-Json
          if (-not $app -or -not $app[0].appId) { throw "Fant ikke app '$env:APP_DISPLAY_NAME'" }
          $appId = $app[0].appId

          # Roter secret
          $label = "AutoSecret-" + (Get-Date -Format "yyyyMMdd-HHmm")
          $cred = az ad app credential reset --id $appId --display-name $label --years $env:SECRET_YEARS -o json | ConvertFrom-Json
          if (-not $cred.password) { throw "Feil: ingen password i respons" }
          $secret = $cred.password
          $expires = $cred.endDateTime

          # Lagre i Key Vault
          az keyvault secret set --vault-name $env:KEYVAULT_NAME --name graph-client-id --value "$appId" -o none
          az keyvault secret set --vault-name $env:KEYVAULT_NAME --name graph-client-secret --value "$secret" -o none
          az keyvault secret set --vault-name $env:KEYVAULT_NAME --name graph-secret-expires --value "$expires" -o none

          # Lagre i Bitwarden SM via bws (krever BW_ACCESS_TOKEN)
          if ($env:BW_ACCESS_TOKEN) {
            $json = '{ "id":"graph-client-secret","value":"' + $secret + '" }'
            echo $json | bws secret edit graph-client-secret --format json >/dev/null 2>&1 || \
            echo $json | bws secret create --format json >/dev/null 2>&1
          } else {
            Write-Host "BW_ACCESS_TOKEN mangler; hopper over BW lagring."
          }

          Write-Host "Rotasjon ferdig. Utløp: $expires"
